<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>굿즈샵 — 내 결제 내역</title>
<meta name="description" content="내가 결제한 굿즈 내역">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header class="site">
  <div class="wrap">
    <a class="brand" href="index.html">굿즈<span>샵</span></a>
    <nav class="site" id="authBox"></nav>
  </div>
</header>

<section>
  <div class="wrap">
    <span class="eyebrow">MY ORDERS</span>
    <h1>내 결제 내역</h1>
    <p class="sub">내가 결제한 내역만 보입니다. 다른 사람의 내역은 조회되지 않습니다.</p>

    <div class="alert err" id="err" role="alert"></div>

    <div id="loading" class="spinner"></div>
    <div class="orders" id="list"></div>
  </div>
</section>

<footer class="site">
  <div class="wrap">
    <span>굿즈샵 · 토스페이먼츠 테스트 모드</span>
    <span>실제 결제가 아닙니다</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/config.js"></script>
<script src="assets/format.js"></script>
<script src="assets/auth.js"></script>
<script>
(function () {
  'use strict';

  var listEl    = document.getElementById('list');
  var loadingEl = document.getElementById('loading');
  var errEl     = document.getElementById('err');

  function render(orders) {
    if (!orders.length) {
      listEl.innerHTML =
        '<div class="empty"><span class="big">🧾</span>아직 결제한 내역이 없습니다.' +
        '<div style="margin-top:16px"><a class="btn" href="index.html">상품 보러 가기</a></div></div>';
      return;
    }

    listEl.innerHTML = orders.map(function (o) {
      var p = o.products || {};
      return '' +
        '<article class="order">' +
          '<div class="emoji">' + Fmt.escape(p.emoji || '📦') + '</div>' +
          '<div>' +
            '<div class="name">' + Fmt.escape(p.name || '(삭제된 상품)') + '</div>' +
            '<div class="meta">' + Fmt.escape(o.order_id) + ' · ' + Fmt.date(o.paid_at || o.created_at) + '</div>' +
          '</div>' +
          '<div class="amt">' + Fmt.won(o.amount) + '</div>' +
          '<div>' + Fmt.statusBadge(o.status) + '</div>' +
        '</article>';
    }).join('');
  }

  App.requireLogin().then(function (user) {
    if (!user) return null;   // requireLogin 이 login.html 로 보냈다
    App.renderHeader(user);
    App.markActiveNav();

    /* RLS 정책이 "본인 것만" 걸러주므로 여기서 user_id 조건을 안 걸어도 안전하다.
       그래도 의도를 명확히 하려고 명시적으로 건다. */
    return App.sb
      .from('orders')
      .select('order_id, amount, status, created_at, paid_at, products(name, emoji)')
      .eq('user_id', user.id)
      .order('created_at', { ascending: false });
  }).then(function (res) {
    if (!res) return;
    loadingEl.style.display = 'none';
    if (res.error) { errEl.textContent = '내역을 불러오지 못했습니다: ' + res.error.message; return; }
    render(res.data || []);
  }).catch(function (e) {
    loadingEl.style.display = 'none';
    errEl.textContent = '오류가 발생했습니다: ' + ((e && e.message) || e);
  });
})();
</script>
</body>
</html>
